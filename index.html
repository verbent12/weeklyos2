<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Weekly OS — автотрекер</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="container">
    <h1>Weekly OS</h1>
    <div class="tabs">
        <span class="tab active">График</span>
        <span class="tab">Рутина</span>
        <span class="tab">Кибер</span>
    </div>
    <div class="stats" id="stats"></div>
    <div class="week-range" id="weekRange"></div>
    <div class="week-calendar" id="weekCalendar"></div>
    <div class="daily-routine" id="dailyRoutine"></div>
    <div class="lecture-note" id="lectureNote"></div>
    <button id="syncBtn" class="sync-btn">⟳ Синхронизировать</button>
</div>
<script src="script.js"></script>
</body>
</html>
